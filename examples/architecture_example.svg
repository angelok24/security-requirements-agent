<svg width="1060" height="600" viewBox="0 0 1060 600" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
  <rect x="0" y="0" width="1060" height="600" fill="#ffffff"/>
  <text x="530" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2a37">Пример архитектурной схемы (обезличенная)</text>

  <!-- ===== Внешние системы (стек) ===== -->
  <rect x="42" y="78" width="300" height="150" rx="6" fill="#eef1f5" stroke="#9aa7b5"/>
  <rect x="34" y="70" width="300" height="150" rx="6" fill="#e9edf2" stroke="#9aa7b5"/>
  <text x="184" y="92" text-anchor="middle" font-size="13" font-weight="600" fill="#3a4656">Внешние системы</text>
  <rect x="50" y="108" width="120" height="92" rx="4" fill="#f7f9fb" stroke="#9aa7b5"/>
  <text x="110" y="158" text-anchor="middle" font-size="12" fill="#1f2a37">База данных</text>
  <rect x="196" y="108" width="120" height="92" rx="4" fill="#f7f9fb" stroke="#9aa7b5"/>
  <text x="256" y="152" text-anchor="middle" font-size="12" fill="#1f2a37">ПО устройства</text>

  <!-- ===== IAM ===== -->
  <rect x="470" y="72" width="180" height="92" rx="6" fill="#dbeafe" stroke="#5b8def"/>
  <text x="560" y="112" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">Сервис</text>
  <text x="560" y="132" text-anchor="middle" font-size="13" fill="#1f2a37">аутентификации (IAM)</text>

  <!-- ===== Внутренние системы ===== -->
  <rect x="700" y="150" width="150" height="78" rx="6" fill="#e9edf2" stroke="#9aa7b5"/>
  <text x="775" y="185" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4656">Внутренние</text>
  <text x="775" y="203" text-anchor="middle" font-size="12" font-weight="600" fill="#3a4656">системы</text>

  <!-- ===== Сервис-сборщик ===== -->
  <rect x="470" y="270" width="180" height="92" rx="6" fill="#fdf6d8" stroke="#d9c86a"/>
  <text x="560" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2a37">Сервис-сборщик</text>
  <text x="560" y="332" text-anchor="middle" font-size="12" fill="#1f2a37">(collector)</text>

  <!-- ===== PostgreSQL ===== -->
  <rect x="452" y="450" width="176" height="80" rx="6" fill="#fdf6d8" stroke="#d9c86a"/>
  <text x="540" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2a37">PostgreSQL</text>

  <!-- ===== BI-дашборд ===== -->
  <rect x="720" y="450" width="160" height="80" rx="6" fill="#fdf6d8" stroke="#d9c86a"/>
  <text x="800" y="496" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2a37">BI-дашборд</text>

  <!-- ===== Актёры ===== -->
  <g fill="#3a4656" font-size="12" text-anchor="middle">
    <circle cx="985" cy="88" r="12" fill="none" stroke="#3a4656"/>
    <line x1="985" y1="100" x2="985" y2="122" stroke="#3a4656"/>
    <text x="985" y="146">Инженер</text>
    <text x="985" y="162">внедрения</text>

    <circle cx="985" cy="300" r="12" fill="none" stroke="#3a4656"/>
    <line x1="985" y1="312" x2="985" y2="334" stroke="#3a4656"/>
    <text x="985" y="358">Системный</text>
    <text x="985" y="374">аналитик</text>

    <circle cx="985" cy="470" r="12" fill="none" stroke="#3a4656"/>
    <line x1="985" y1="482" x2="985" y2="504" stroke="#3a4656"/>
    <text x="985" y="528">Оператор</text>
  </g>

  <!-- ===== Потоки: HTTPS (пунктир, синий) ===== -->
  <g stroke="#4a90d9" stroke-width="1.6" stroke-dasharray="6 4" fill="none">
    <line x1="334" y1="150" x2="470" y2="118"/>          <!-- внешние -> IAM -->
    <line x1="560" y1="164" x2="560" y2="270"/>          <!-- IAM -> collector -->
    <line x1="650" y1="120" x2="960" y2="96"/>           <!-- IAM -> инженер -->
    <line x1="650" y1="300" x2="960" y2="300"/>          <!-- collector -> аналитик -->
    <line x1="650" y1="200" x2="700" y2="190"/>          <!-- IAM <-> внутренние -->
    <line x1="628" y1="490" x2="720" y2="490"/>          <!-- postgres -> дашборд -->
  </g>
  <g stroke="#2b3440" stroke-width="1.6" fill="none">
    <line x1="560" y1="362" x2="540" y2="450"/>          <!-- collector -> postgres (PGSQL) -->
    <line x1="880" y1="490" x2="960" y2="474"/>          <!-- дашборд -> оператор -->
  </g>

  <!-- Подписи потоков -->
  <g font-size="10.5" fill="#4a90d9">
    <text x="398" y="128">HTTPS (2)</text>
    <text x="566" y="222">HTTPS (1)</text>
    <text x="800" y="86">HTTPS (3)</text>
    <text x="760" y="292">HTTPS (5)</text>
  </g>
  <g font-size="10.5" fill="#2b3440">
    <text x="500" y="410">PGSQL (6)</text>
  </g>
  <g font-size="10.5" fill="#3a4656">
    <text x="360" y="112">ClientID / Secret</text>
    <text x="668" y="150">Access Token</text>
    <text x="890" y="286">JSON с данными</text>
  </g>

  <!-- ===== Легенда ===== -->
  <rect x="34" y="470" width="360" height="104" rx="6" fill="#ffffff" stroke="#cdd5df"/>
  <rect x="50" y="486" width="26" height="16" fill="#e9edf2" stroke="#9aa7b5"/>
  <text x="86" y="499" font-size="11.5" fill="#3a4656">Другие / внешние системы</text>
  <rect x="50" y="512" width="26" height="16" fill="#dbeafe" stroke="#5b8def"/>
  <text x="86" y="525" font-size="11.5" fill="#3a4656">Прочие сервисы</text>
  <rect x="50" y="538" width="26" height="16" fill="#fdf6d8" stroke="#d9c86a"/>
  <text x="86" y="551" font-size="11.5" fill="#3a4656">Сервисы модуля аналитики</text>
</svg>
